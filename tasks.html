<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks — Om Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body class="site-minimal" data-om-page="tasks">
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="setup-alert" class="section app-wrap hidden" style="margin:1.25rem auto;max-width:720px;"></div>

  <div class="app-wrap app-wrap--narrow" id="main-app">
    <header class="site-header site-header--minimal">
      <div class="brand">
        <span class="brand-title">Tasks</span>
        <span class="brand-sub">Today only — check off when done.</span>
      </div>
      <div class="header-actions">
        <span class="status-pill status-pill--quiet" id="today-label">Today</span>
        <a class="btn btn-ghost btn--small" href="./father.html">Family</a>
      </div>
    </header>

    <nav class="app-nav app-nav--minimal" id="main-nav" aria-label="Site pages">
      <a class="nav-link" href="./index.html">Home</a>
      <a class="nav-link" href="./schedule.html">Study</a>
      <a class="nav-link" href="./plan.html">Plan</a>
      <a class="nav-link" href="./timers.html">Timers</a>
      <a class="nav-link nav-link-active" href="./tasks.html" aria-current="page">Tasks</a>
      <a class="nav-link" href="./history.html">History</a>
      <a class="nav-link" href="./settings.html">Settings</a>
    </nav>

    <section class="section section--flat">
      <h2 class="section-label">Today</h2>
      <p class="section-hint">One line per task. Timestamps save when you tick.</p>
      <div id="task-list"></div>
      <div class="add-task-row add-task-row--simple">
        <input type="text" id="new-task-text" placeholder="What are you doing today?" aria-label="New task" />
        <button type="button" class="btn btn-primary" id="btn-add-task">Add</button>
      </div>
    </section>
  </div>

  <script type="module" src="./src/om-main.js"></script>
</body>

</html>
