<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Om — IIT Bombay JEE Study Dashboard</title>
  <meta http-equiv="refresh" content="0; url=./index.html" />
  <link rel="canonical" href="./index.html" />
  <style>
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #f7f5f2 0%, #eeebe5 50%, #e5e0d8 100%);
      color: #252218;
    }
    .redirect-message {
      text-align: center;
      padding: 2rem;
    }
    .redirect-message h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #003d82;
    }
    .redirect-message p {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }
    .redirect-message a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #8a7229 0%, #a68b32 100%);
      color: #fffdf8;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .redirect-message a:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="redirect-message">
    <h1>🎯 Om Study Dashboard</h1>
    <p>Redirecting to main dashboard...</p>
    <p><a href="./index.html">Click here if not redirected automatically →</a></p>
  </div>
  <script>
    // Immediate redirect as backup
    window.location.href = './index.html';
  </script>
</body>
</html>
