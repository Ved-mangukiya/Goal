<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History — Om Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script type="module" crossorigin src="/Goal/assets/timetable-utils-BZjoTWl5.js"></script>
  <script type="module" crossorigin src="/Goal/assets/om-main-WXwc8blh.js"></script>
  <link rel="stylesheet" crossorigin href="/Goal/assets/timetable-utils-g5k03O97.css">
</head>

<body class="site-minimal" data-om-page="history">
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="setup-alert" class="section app-wrap hidden" style="margin:1.25rem auto;max-width:720px;"></div>

  <div class="app-wrap app-wrap--narrow" id="main-app">
    <header class="site-header site-header--minimal">
      <div class="brand">
        <span class="brand-title">History</span>
        <span class="brand-sub">Stopped timers, newest first.</span>
      </div>
      <div class="header-actions">
        <span class="status-pill status-pill--quiet" id="today-label">Today</span>
      </div>
    </header>

    <nav class="app-nav app-nav--minimal" id="main-nav" aria-label="Site pages">
      <a class="nav-link" href="./index.html">Home</a>
      <a class="nav-link" href="./schedule.html">Study</a>
      <a class="nav-link" href="./plan.html">Plan</a>
      <a class="nav-link" href="./timers.html">Timers</a>
      <a class="nav-link" href="./tasks.html">Tasks</a>
      <a class="nav-link nav-link-active" href="./history.html" aria-current="page">History</a>
      <a class="nav-link" href="./settings.html">Settings</a>
    </nav>

    <section class="section section--flat">
      <h2 class="section-label">Sessions</h2>
      <p class="section-hint">From Study / Timers stop actions.</p>
      <div class="log-table-wrap">
        <table class="log-table">
          <thead>
            <tr>
              <th scope="col">Calendar date</th>
              <th scope="col">Subject</th>
              <th scope="col">Duration</th>
              <th scope="col">Finished time</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </section>
  </div>

</body>

</html>
