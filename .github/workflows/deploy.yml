name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:gh

      - name: Set launcher as site root
        # Rename built files so open-app.html becomes the entry point
        # and the dashboard moves to dashboard.html
        run: |
          cp dist/index.html dist/dashboard.html
          cp dist/open-app.html dist/index.html
          sed -i 's|href="./index.html"|href="./dashboard.html"|g' dist/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
